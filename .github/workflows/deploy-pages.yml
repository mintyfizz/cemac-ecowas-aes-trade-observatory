name: Deploy static dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export Databricks gold tables to static JSON
        env:
          DATABRICKS_HOST:      ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN:     ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_CATALOG:   ${{ secrets.DATABRICKS_CATALOG }}
        run: python scripts/export_static.py

      - name: Validate frontend JavaScript
        run: |
          node --check static/js/charts.js
          node --check static/js/app_static.js

      - name: Validate Python scripts
        run: |
          python -m py_compile scripts/databricks_sql.py scripts/export_static.py scripts/audit_dashboard_data.py scripts/validate_dashboard_contract.py

      - name: Audit exported static dashboard data
        env:
          DATABRICKS_HOST:      ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN:     ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_CATALOG:   ${{ secrets.DATABRICKS_CATALOG }}
        run: python scripts/audit_dashboard_data.py --check-only

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: static/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
