name: Deploy static dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export Databricks gold tables to static JSON
        env:
          DATABRICKS_HOST:      ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN:     ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_CATALOG:   ${{ secrets.DATABRICKS_CATALOG }}
        run: python scripts/export_static.py

      # Copy shared assets from public/ into the static/ build directory.
      - name: Copy CSS and charts.js from public/
        run: |
          mkdir -p static/css static/js
          cp -r public/css/. static/css/
          cp public/js/charts.js static/js/charts.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: static/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
